<script>
// 交互效果
document.addEventListener('DOMContentLoaded', function() {
    // 卡片悬停效果
    const cards = document.querySelectorAll('.service-card, .case-card');
    cards.forEach(card => {
        card.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-8px)';
            this.style.boxShadow = '0 20px 40px rgba(0, 123, 255, 0.25)';
        });
        
        card.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = '0 10px 30px rgba(0, 123, 255, 0.2)';
        });
    });
    
    // 终端模拟输出
    const terminalLines = document.querySelectorAll('.terminal-line');
    terminalLines.forEach((line, index) => {
        line.style.opacity = '0';
        line.style.transform = 'translateY(10px)';
        
        setTimeout(() => {
            line.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            line.style.opacity = '1';
            line.style.transform = 'translateY(0)';
        }, index * 300);
    });
    
    // 统计数据动画
    const statValues = document.querySelectorAll('.stat-value');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const stat = entry.target;
                const finalText = stat.textContent;
                const isPercentage = finalText.includes('%');
                const isCurrency = finalText.includes('$');
                const isTime = finalText.includes('/');
                
                let finalNumber = parseFloat(finalText.replace(/[^0-9.]/g, ''));
                let currentNumber = 0;
                const increment = finalNumber / 30;
                
                const timer = setInterval(() => {
                    currentNumber += increment;
                    if (currentNumber >= finalNumber) {
                        stat.textContent = finalText;
                        clearInterval(timer);
                    } else {
                        let displayValue;
                        if (isPercentage) {
                            displayValue = Math.floor(currentNumber) + '%';
                        } else if (isCurrency) {
                            displayValue = '$' + Math.floor(currentNumber).toLocaleString() + '+';
                        } else if (isTime) {
                            displayValue = finalText;
                        } else {
                            displayValue = Math.floor(currentNumber).toLocaleString() + '+';
                        }
                        stat.textContent = displayValue;
                    }
                }, 30);
                
                observer.unobserve(stat);
            }
        });
    }, { threshold: 0.5 });
    
    statValues.forEach(stat => observer.observe(stat));
    
    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            if (targetId === '#') return;
            
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
                window.scrollTo({
                    top: targetElement.offsetTop - 80,
                    behavior: 'smooth'
                });
            }
        });
    });
});
</script>
